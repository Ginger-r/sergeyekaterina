        function applyPolaroidEffect(video, canvas) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                let contrast = 1.2;
                r = ((r - 128) * contrast) + 128;
                g = ((g - 128) * contrast) + 128;
                b = ((b - 128) * contrast) + 128;
                
                r = Math.min(255, r * 1.05);
                b = Math.max(0, b * 0.92);
                
                let x = (i / 4) % canvas.width;
                let y = Math.floor((i / 4) / canvas.width);
                let distX = (x / canvas.width - 0.5) * 2;
                let distY = (y / canvas.height - 0.5) * 2;
                let vignette = 1 - (Math.sqrt(distX*distX + distY*distY) * 0.3);
                
                data[i] = Math.min(255, Math.max(0, r * vignette));
                data[i+1] = Math.min(255, Math.max(0, g * vignette));
                data[i+2] = Math.min(255, Math.max(0, b * vignette));
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            let framePadding = canvas.width * 0.08;
            let newCanvas = document.createElement('canvas');
            newCanvas.width = canvas.width + framePadding * 2;
            newCanvas.height = canvas.height + framePadding * 3;
            let newCtx = newCanvas.getContext('2d');
            
            newCtx.fillStyle = '#F5F0E8';
            newCtx.fillRect(0, 0, newCanvas.width, newCanvas.height);
            
            newCtx.shadowColor = 'rgba(0,0,0,0.2)';
            newCtx.shadowBlur = 8;
            newCtx.drawImage(canvas, framePadding, framePadding, canvas.width, canvas.height);
            newCtx.shadowColor = 'transparent';
            
            newCtx.font = `${framePadding * 0.6}px "Courier New", monospace`;
            newCtx.fillStyle = '#2c2c2c';
            newCtx.textAlign = 'center';
            let date = new Date();
            let dateStr = `${date.getDate().toString().padStart(2,'0')}.${(date.getMonth()+1).toString().padStart(2,'0')}.${date.getFullYear()}`;
            newCtx.fillText(dateStr, newCanvas.width / 2, canvas.height + framePadding * 1.8);
            
            return newCanvas;
        }

        async function captureAndUpload() {
            if (shotsLeft <= 0) {
                stopShooting();
                showToast('🎬 Плёнка закончилась!', 3000);
